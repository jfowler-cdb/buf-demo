syntax = "proto3";

package cdbaby.demo.v1beta1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service ReleaseService {
  rpc GetRelease(GetReleaseRequest) returns (GetReleaseResponse) {
    option (google.api.http) = {get: "/v1beta1/releases/{id}"};
  }
  rpc ListReleases(ListReleasesRequest) returns (ListReleasesResponse) {
    option (google.api.http) = {get: "/v1beta1/releases"};
  }
  rpc CreateRelease(CreateReleaseRequest) returns (CreateReleaseResponse) {
    option (google.api.http) = {
      post: "/v1beta1/releases"
      body: "release"
    };
  }
  rpc UpdateRelease(UpdateReleaseRequest) returns (UpdateReleaseResponse) {
    option (google.api.http) = {
      patch: "/v1beta1/releases/{release.id}"
      body: "release"
    };
  }
  rpc DeleteRelease(DeleteReleaseRequest) returns (DeleteReleaseResponse) {
    option (google.api.http) = {delete: "/v1beta1/releases/{id}"};
  }
}

message Release {
  // Output only.
  string id = 1 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {uuid: true}
  }];
  string title = 2 [(buf.validate.field).string.min_len = 1];
  string artist = 3 [(buf.validate.field).string.min_len = 1];
  string label = 4;
  google.protobuf.Timestamp release_date = 5 [(buf.validate.field).required = true];
  // Output only.
  google.protobuf.Timestamp create_time = 6 [(buf.validate.field).ignore = IGNORE_ALWAYS];
  // Output only.
  google.protobuf.Timestamp update_time = 7 [(buf.validate.field).ignore = IGNORE_ALWAYS];
}

message GetReleaseRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetReleaseResponse {
  Release release = 1;
}

message ListReleasesRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  string page_token = 2;
}

message ListReleasesResponse {
  repeated Release releases = 1;
  string next_page_token = 2;
}

message CreateReleaseRequest {
  Release release = 1 [(buf.validate.field).required = true];
}

message CreateReleaseResponse {
  Release release = 1;
}

message UpdateReleaseRequest {
  Release release = 1 [(buf.validate.field).required = true];
}

message UpdateReleaseResponse {
  Release release = 1;
}

message DeleteReleaseRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteReleaseResponse {
  Release release = 1;
}
