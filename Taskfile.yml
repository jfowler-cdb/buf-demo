# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  generate:
    desc: Generate Protobuf code using Buf
    cmds:
      - buf lint
      - buf generate
      - yq -P -o yaml gateway/openapi/api.swagger.json > gateway/openapi/api.swagger.yaml
    silent: true

  run:
    desc: Run API, gateway, and client
    cmds:
      - trap 'kill 0' EXIT; dotnet run --project API & (cd gateway && go run .) & (cd client && npm run dev) & wait

  run:api:
    desc: Run the C# gRPC API
    cmds:
      - dotnet run --project API
    silent: true

  run:client:
    desc: Run the Next.js client
    dir: client
    cmds:
      - npm run dev
    silent: true

  test:
    desc: Run tests
    cmds:
      - dotnet run --project API.Tests
    silent: true

  seed:
    desc: Seed the database with sample releases
    cmds:
      - dotnet run --project API -- seed
    silent: true

  migrate:diff:
    desc: Generate a new Atlas migration
    cmds:
      - atlas migrate diff --env local {{.CLI_ARGS}}
    silent: true

  migrate:apply:
    desc: Apply Atlas migrations
    cmds:
      - atlas migrate apply --env local
    silent: true

  # ── Demo tasks ─────────────────────────────────────────────

  demo:reset:
    desc: Reset to main with a clean database
    cmds:
      - git checkout main
      - rm -f API/releases.db
      - task migrate:apply
      - task seed
    silent: true

  demo:step1:
    desc: "Step 1: Define the schema"
    cmds:
      - task: demo:reset
      - git checkout demo/step-1-proto
      - echo ""
      - echo "━━━ tracks.proto ━━━"
      - sed -n '17,40p' proto/cdbaby/demo/v1beta1/tracks.proto
      - echo ""
      - buf lint && echo "✓ buf lint passed"
      - buf breaking --against '.git#branch=main' && echo "✓ buf breaking passed (additive only)"

  demo:step2:
    desc: "Step 2: Generate code"
    cmds:
      - task: demo:step1
      - git checkout demo/step-2-generate
      - buf generate
      - echo ""
      - echo "━━━ Generated files ━━━"
      - git diff demo/step-1-proto..demo/step-2-generate --stat

  demo:step3:
    desc: "Step 3: Backend — build, migrate, seed, test"
    cmds:
      - task: demo:step2
      - git checkout demo/step-3-backend
      - dotnet build API
      - atlas migrate diff add_tracks --env local
      - echo ""
      - echo "━━━ Generated migration ━━━"
      - cat migrations/*add_tracks*
      - echo ""
      - rm -f API/releases.db
      - atlas migrate apply --env local
      - dotnet run --project API -- seed
      - dotnet run --project API.Tests

  demo:step4:
    desc: "Step 4: Client — build and run"
    cmds:
      - task: demo:step3
      - git checkout demo/step-4-client
      - cd client && npm run build
      - echo ""
      - echo "✓ Client built — run 'task run' to start all apps"

  demo:step5:
    desc: "Step 5: Go gateway — Connect, REST, OpenAPI"
    cmds:
      - task: demo:step4
      - git checkout demo/step-5-gateway
      - task generate
      - cd gateway && go build ./...
      - echo ""
      - echo "━━━ curl Connect JSON ━━━"
      - 'echo "curl -s http://localhost:8080/cdbaby.demo.v1beta1.ReleaseService/ListReleases -H ''Content-Type: application/json'' -H ''Connect-Protocol-Version: 1'' -d ''{\"pageSize\":2}''"'
      - echo ""
      - echo "━━━ curl REST ━━━"
      - 'echo "curl -s http://localhost:8080/v1beta1/releases?page_size=2"'
      - echo ""
      - echo "━━━ OpenAPI spec ━━━"
      - 'echo "curl -s http://localhost:8080/openapi/api.swagger.json"'
      - echo ""
      - echo "✓ Gateway built — run 'task run' to start all apps"

  demo:break-proto:
    desc: "Break demo: renamed proto field"
    cmds:
      - task: demo:step1
      - git checkout demo/break-proto
      - echo ""
      - echo "━━━ The change ━━━"
      - git diff demo/step-1-proto..demo/break-proto -- '*.proto'
      - echo ""
      - echo "━━━ buf breaking result ━━━"
      - cmd: buf breaking --against '.git#branch=demo/step-1-proto'
        ignore_error: true

  demo:break-mapper:
    desc: "Break demo: proto/entity drift"
    cmds:
      - task: demo:step3
      - git checkout demo/break-mapper
      - echo ""
      - echo "━━━ dotnet build result ━━━"
      - cmd: dotnet build API 2>&1 | grep 'error RMG'
        ignore_error: true